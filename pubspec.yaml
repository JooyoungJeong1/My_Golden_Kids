name: trash_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  url_launcher: ^6.3.2
  http: ^1.2.0
  image_picker: ^1.0.4
  http_parser: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/비닐류.png
    - assets/images/종이류.png
    - assets/images/캔류.png
    - assets/images/유리류.png
    - assets/images/플라스틱류.png
    - assets/images/기타처치곤란.png
    - assets/images/앱로딩.png
    - assets/images/앱로고.png
    - assets/images/앱아이콘.png


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/앱아이콘.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/앱로딩.png"
  android_gravity: center
  ios_content_mode: scaleAspectFit  # 로딩때 뜰 이미지